name: k6 Performance Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  performance-test:
    name: Run k6 Load & Performance Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Build Web Application
        run: npm run build

      - name: Start Express Server in Background
        run: npm run start &

      - name: Wait for Server to be Responsive
        run: |
          echo "Waiting for live application on port 3000..."
          timeout 30 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 1; done'
          echo "Server is ready!"

      - name: Create Logs Directory
        run: mkdir -p logs

      - name: Run k6 Performance Test Suite
        run: npm run test:perf

      - name: Upload Performance Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-performance-report
          path: |
            summary.txt
            performance-summary.json
          retention-days: 14
